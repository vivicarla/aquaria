<main class="flex flex-col min-h-screen bg-slate-900 overflow-hidden">
    <div class="bg-slate-600/10">
        <header class="text-center md:text-left px-6 pt-16 pb-10 max-w-6xl mx-auto w-full">

            <h2 class="text-4xl md:text-5xl font-extrabold text-slate-100 leading-tight ">
                Bem-vindo a <span class="text-red-500">Aquária</span> Noticías
            </h2>

            <p class="mt-4 text-2xl text-slate-200 max-w-xl">
                Aquária, um país em risco pela exploração dos oceanos
            </p>

        </header>
    </div>
   <div class="flex flex-col gap-12 px-6 pb-16 max-w-5xl mx-auto w-full">

        <article *ngFor="let item of requisicao"
    class="w-full mb-16 p-7">

    <!-- IMAGEM GRANDE -->
    <img [src]="item.imagem"
        alt="Imagem da notícia"
        class="w-full h-72 md:h-100 object-cover rounded-xl ">

    <!-- TEXTO ABAIXO -->
    <div class="mt-6 max-w-3xl">

        <h2 class="text-3xl md:text-4xl font-bold text-red-500">
            {{item.titulo}}
        </h2>

        <h3 class="text-xl text-slate-300 mt-2">
            {{item.not}}
        </h3>

        <div class="w-16 h-1 bg-red-500 rounded-full my-4"></div>

        <p class="text-slate-200 text-lg leading-relaxed">
            {{item.descricao}}
        </p>

    </div>

</article>

    </div>
</main>
